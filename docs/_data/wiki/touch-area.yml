# Multi-language body for /wiki/touch-area.html (and /<lang>/wiki/touch-area.html).
# Edit here, the 4 stub HTML files just include this via _includes/wiki-body.html.
'zh-CN': |
  
  <blockquote>
      <p>本页只针对 <strong>V2（Cubism 4+ / 5）</strong>模型，也就是 <code>*.model3.json</code>。V1（journey-ad / Cubism 2~3）模型的触摸是另外一套机制（基于 <code>hit_areas_custom</code>），本页不展开。</p>
  </blockquote>
  
  <h2>1. 触摸区域写在哪里？</h2>
  <p>V2 模型的触摸区由 <code>*.model3.json</code> 顶层 <code>HitAreas</code> 字段定义，每一项是一个命名 + 一个对应的 ArtMesh ID，浏览器会用 Cubism Core 计算出 ArtMesh 的命中盒，点击命中即视为该 HitArea 被点击。</p>
  
  <pre><code>{
    "Version": 3,
    "FileReferences": { ... },
    "HitAreas": [
      { "Name": "Head",   "Id": "HitAreaHead"   },
      { "Name": "Body",   "Id": "HitAreaBody"   }
    ]
  }</code></pre>
  <ul>
      <li><strong>Name</strong>：逻辑名称，本插件会根据这个名字派发动作。约定的名字一般是 <code>Head</code> 和 <code>Body</code>，对应模型的"头"和"身体"区域。</li>
      <li><strong>Id</strong>：在 Cubism Editor 里给那块 ArtMesh 起的 ID。在 Editor 中选中网格 → 右侧检查器可以看到 / 修改这个 ID。</li>
  </ul>
  
  <h2>2. HitArea 与 motion 分组的对应关系</h2>
  <p>本插件里的派发规则与 Live2D 官方 CubismWebSamples 一致：</p>
  <table>
      <thead>
          <tr><th style="width:20%">点击的 HitArea</th><th>触发的 motion 分组</th><th>需要在 model3.json 的 Motions 中存在哪个 group</th></tr>
      </thead>
      <tbody>
          <tr><td><code>Head</code></td><td>表情切换（随机一个 expression）</td><td><code>Expressions</code> 字段（不是 Motions）</td></tr>
          <tr><td><code>Body</code></td><td>触摸身体动作组</td><td><code>Motions.TapBody</code></td></tr>
      </tbody>
  </table>
  <p>如果你的 model3.json 里没有 <code>Expressions</code> / <code>TapBody</code>，对应区域点了也不会有反应，但不会报错。</p>
  
  <h2>3. 在 Cubism Editor 里怎么标记一个 ArtMesh 为 HitArea？</h2>
  <ol>
      <li>打开 .cmo3 工程，进入 <strong>建模</strong> 视图。</li>
      <li>选中你想作为命中区的 ArtMesh（一般是覆盖头部 / 身体的那一片网格）。</li>
      <li>右侧检查器 → <strong>ID</strong>，记下或修改一个好认的 ID（比如 <code>HitAreaHead</code>）。</li>
      <li>导出 <code>.moc3</code> 时勾选「嵌入纹理图集」并生成 <code>.model3.json</code>。</li>
      <li>用文本编辑器打开 <code>.model3.json</code>，在 <code>HitAreas</code> 数组里加一条 <code>{ "Name": "Head", "Id": "HitAreaHead" }</code>（如果导出时已经勾了"含 HitArea"那 Editor 会自动写）。</li>
  </ol>
  
  <h2>4. 调试技巧</h2>
  <ul>
      <li>如果点击没反应，先看浏览器控制台有没有 motion / expression 加载失败的错误。</li>
      <li>HitArea 的命中是基于 ArtMesh 的 <em>实际可见网格</em>，如果该 ArtMesh 透明度为 0（被你藏起来了），它依然占着那块命中盒；这通常是"明明没看到东西却点得到"的原因。</li>
      <li>不同模型作者命名不一致：有的把头标成 <code>HitAreaHead</code>，有的标成 <code>head</code>，有的甚至给每个 HitArea 起名 <code>HitArea</code>。本插件按 <strong>Name</strong> 派发，所以请确保 Name 是 <code>Head</code> 或 <code>Body</code>。</li>
  </ul>
  
  <h2>5. 进一步阅读</h2>
  <ul>
      <li>Live2D 官方文档：<a href="https://docs.live2d.com/zh-CHS/cubism-editor-manual/hit-area/" target="_blank" rel="noopener">命中区域设置（Cubism Editor）</a></li>
      <li>Live2D 官方文档：<a href="https://docs.live2d.com/zh-CHS/cubism-sdk-manual/json-model3/" target="_blank" rel="noopener">model3.json 文件规范</a></li>
      <li>本插件 V2 加载器源码：<code>live2d_sdk/src/v2/lapplive2dmanager.ts</code> 与 <code>lappmodel.ts</code></li>
  </ul>
  
  <p>如有需求，欢迎在 <a href="https://github.com/jiangweifang/wp-live2d/issues" target="_blank" rel="noopener">GitHub Issues</a> 中反馈，会继续补充更具体的样例（包括如何把 HitArea 派发到自定义动作组）。</p>
'en': |
  
  <blockquote>
      <p>This page only covers <strong>V2 (Cubism 4+ / 5)</strong> models, i.e. <code>*.model3.json</code>. Hit areas on V1 (journey-ad / Cubism 2~3) models use a different mechanism (based on <code>hit_areas_custom</code>) and are not covered here.</p>
  </blockquote>
  
  <h2>1. Where do hit areas live?</h2>
  <p>For a V2 model, hit areas are defined under the top-level <code>HitAreas</code> field in <code>*.model3.json</code>. Each entry has a Name and a corresponding ArtMesh ID; the browser uses Cubism Core to compute the hit box for that ArtMesh, and a tap inside that box counts as a hit on the named area.</p>
  
  <pre><code>{
    "Version": 3,
    "FileReferences": { ... },
    "HitAreas": [
      { "Name": "Head",   "Id": "HitAreaHead"   },
      { "Name": "Body",   "Id": "HitAreaBody"   }
    ]
  }</code></pre>
  <ul>
      <li><strong>Name</strong>: a logical name. The plugin dispatches motions based on this name. The conventional names are <code>Head</code> and <code>Body</code>, corresponding to the head and body regions.</li>
      <li><strong>Id</strong>: the ID assigned to that ArtMesh in Cubism Editor. Select the mesh and view / edit the ID in the inspector on the right.</li>
  </ul>
  
  <h2>2. HitArea → motion group mapping</h2>
  <p>The dispatch rules are the same as Live2D's official CubismWebSamples:</p>
  <table>
      <thead>
          <tr><th style="width:20%">HitArea tapped</th><th>Triggered motion group</th><th>Required group in model3.json's Motions</th></tr>
      </thead>
      <tbody>
          <tr><td><code>Head</code></td><td>Switch expression (random one)</td><td>The <code>Expressions</code> field (not Motions)</td></tr>
          <tr><td><code>Body</code></td><td>Body-tap motion group</td><td><code>Motions.TapBody</code></td></tr>
      </tbody>
  </table>
  <p>If your model3.json has no <code>Expressions</code> / <code>TapBody</code>, tapping that area does nothing — but it does not throw an error either.</p>
  
  <h2>3. How do I mark an ArtMesh as a HitArea inside Cubism Editor?</h2>
  <ol>
      <li>Open the .cmo3 project and switch to the <strong>Modeling</strong> view.</li>
      <li>Select the ArtMesh you want to treat as a hit zone (typically the mesh that covers the head / body region).</li>
      <li>Inspector on the right → <strong>ID</strong>: note or change to a recognisable ID (e.g. <code>HitAreaHead</code>).</li>
      <li>When exporting <code>.moc3</code>, tick "Embed texture atlas" and produce the <code>.model3.json</code>.</li>
      <li>Open <code>.model3.json</code> in a text editor and add an entry to the <code>HitAreas</code> array, e.g. <code>{ "Name": "Head", "Id": "HitAreaHead" }</code>. (If you ticked "include HitArea" on export, Editor writes this for you.)</li>
  </ol>
  
  <h2>4. Debugging tips</h2>
  <ul>
      <li>If a tap does nothing, first check the browser console for motion / expression load errors.</li>
      <li>Hit testing is based on the ArtMesh's <em>actual visible mesh</em>. If you set the ArtMesh's opacity to 0 (hiding it), it still occupies the same hit box — this is the usual cause of "I'm clicking on nothing yet it still triggers".</li>
      <li>Different model authors use different naming conventions: some use <code>HitAreaHead</code>, some <code>head</code>, some even name every HitArea <code>HitArea</code>. The plugin dispatches by <strong>Name</strong>, so make sure Name is <code>Head</code> or <code>Body</code>.</li>
  </ul>
  
  <h2>5. Further reading</h2>
  <ul>
      <li>Live2D official docs: <a href="https://docs.live2d.com/en/cubism-editor-manual/hit-area/" target="_blank" rel="noopener">Hit area settings (Cubism Editor)</a></li>
      <li>Live2D official docs: <a href="https://docs.live2d.com/en/cubism-sdk-manual/json-model3/" target="_blank" rel="noopener">model3.json file specification</a></li>
      <li>The plugin's V2 loader source: <code>live2d_sdk/src/v2/lapplive2dmanager.ts</code> and <code>lappmodel.ts</code></li>
  </ul>
  
  <p>If you need more, please file feedback in <a href="https://github.com/jiangweifang/wp-live2d/issues" target="_blank" rel="noopener">GitHub Issues</a>; we'll add more concrete examples (including how to dispatch HitAreas to custom motion groups) over time.</p>
'ja': |
  
  <blockquote>
      <p>このページは <strong>V2(Cubism 4+ / 5)</strong> モデル、すなわち <code>*.model3.json</code> 専用です。V1(journey-ad / Cubism 2~3)モデルの当たり判定は別の仕組み(<code>hit_areas_custom</code> ベース)で扱われ、本ページの対象外です。</p>
  </blockquote>
  
  <h2>1. 当たり判定はどこに書く?</h2>
  <p>V2 モデルの当たり判定は <code>*.model3.json</code> のトップレベル <code>HitAreas</code> フィールドで定義します。各エントリには Name と対応する ArtMesh ID があり、ブラウザは Cubism Core で ArtMesh の当たり判定ボックスを計算し、ボックス内のクリックを当該 HitArea のヒットとみなします。</p>
  
  <pre><code>{
    "Version": 3,
    "FileReferences": { ... },
    "HitAreas": [
      { "Name": "Head",   "Id": "HitAreaHead"   },
      { "Name": "Body",   "Id": "HitAreaBody"   }
    ]
  }</code></pre>
  <ul>
      <li><strong>Name</strong>:論理名。プラグインはこの名前を見てモーションを振り分けます。慣例として <code>Head</code> と <code>Body</code> を使い、それぞれ「頭」「体」に対応します。</li>
      <li><strong>Id</strong>:Cubism Editor でその ArtMesh に付けた ID。Editor 上でメッシュを選択 → 右側のインスペクタで参照 / 変更できます。</li>
  </ul>
  
  <h2>2. HitArea とモーショングループの対応関係</h2>
  <p>本プラグインの振り分けルールは Live2D 公式 CubismWebSamples と一致しています:</p>
  <table>
      <thead>
          <tr><th style="width:20%">タップした HitArea</th><th>発火するモーショングループ</th><th>model3.json の Motions に必要なグループ</th></tr>
      </thead>
      <tbody>
          <tr><td><code>Head</code></td><td>表情切替(ランダムに 1 つ)</td><td><code>Expressions</code> フィールド(Motions ではない)</td></tr>
          <tr><td><code>Body</code></td><td>体タップモーショングループ</td><td><code>Motions.TapBody</code></td></tr>
      </tbody>
  </table>
  <p>model3.json に <code>Expressions</code> / <code>TapBody</code> が無い場合、その領域をタップしても何も起こりませんが、エラーにもなりません。</p>
  
  <h2>3. Cubism Editor で ArtMesh を HitArea として登録するには?</h2>
  <ol>
      <li>.cmo3 プロジェクトを開き、<strong>モデリング</strong>ビューに切り替えます。</li>
      <li>当たり判定にしたい ArtMesh(通常は頭部 / 体を覆っているメッシュ)を選択。</li>
      <li>右側インスペクタ → <strong>ID</strong>。識別しやすい ID(例:<code>HitAreaHead</code>)を控える/変更します。</li>
      <li><code>.moc3</code> を書き出す際に「テクスチャアトラスを埋め込む」をチェックし、<code>.model3.json</code> を生成。</li>
      <li>テキストエディタで <code>.model3.json</code> を開き、<code>HitAreas</code> 配列に <code>{ "Name": "Head", "Id": "HitAreaHead" }</code> を追加します(書き出し時に「HitArea を含む」をチェックしていれば Editor が自動で書きます)。</li>
  </ol>
  
  <h2>4. デバッグのコツ</h2>
  <ul>
      <li>タップしても反応しない場合は、まずブラウザコンソールに motion / expression のロード失敗エラーが無いか確認してください。</li>
      <li>当たり判定は ArtMesh の<em>実際の可視メッシュ</em>に基づきます。ArtMesh の不透明度を 0 にして隠していても、当たり判定ボックスは生きています。「何も見えていないのにクリック判定がある」という現象の典型的な原因です。</li>
      <li>モデル作者によって命名が一致しません。ある人は <code>HitAreaHead</code>、ある人は <code>head</code>、極端な例では全部 <code>HitArea</code> という名前のことすらあります。本プラグインは <strong>Name</strong> で振り分けるので、必ず Name を <code>Head</code> または <code>Body</code> にしてください。</li>
  </ul>
  
  <h2>5. 参考リンク</h2>
  <ul>
      <li>Live2D 公式ドキュメント:<a href="https://docs.live2d.com/cubism-editor-manual/hit-area/" target="_blank" rel="noopener">当たり判定設定(Cubism Editor)</a></li>
      <li>Live2D 公式ドキュメント:<a href="https://docs.live2d.com/cubism-sdk-manual/json-model3/" target="_blank" rel="noopener">model3.json ファイル仕様</a></li>
      <li>本プラグインの V2 ローダーソース:<code>live2d_sdk/src/v2/lapplive2dmanager.ts</code> と <code>lappmodel.ts</code></li>
  </ul>
  
  <p>ご要望があれば <a href="https://github.com/jiangweifang/wp-live2d/issues" target="_blank" rel="noopener">GitHub Issues</a> までお寄せください。HitArea を独自モーショングループに振り分ける具体例なども順次追加していきます。</p>
'zh-TW': |
  
  <blockquote>
      <p>本頁只針對 <strong>V2（Cubism 4+ / 5）</strong>模型，也就是 <code>*.model3.json</code>。V1（journey-ad / Cubism 2~3）模型的觸碰是另一套機制（基於 <code>hit_areas_custom</code>），本頁不展開。</p>
  </blockquote>
  
  <h2>1. 觸碰區域寫在哪裡？</h2>
  <p>V2 模型的觸碰區由 <code>*.model3.json</code> 頂層 <code>HitAreas</code> 欄位定義，每一項是一個命名 + 一個對應的 ArtMesh ID，瀏覽器會用 Cubism Core 計算出 ArtMesh 的命中盒，點擊命中即視為該 HitArea 被點擊。</p>
  
  <pre><code>{
    "Version": 3,
    "FileReferences": { ... },
    "HitAreas": [
      { "Name": "Head",   "Id": "HitAreaHead"   },
      { "Name": "Body",   "Id": "HitAreaBody"   }
    ]
  }</code></pre>
  <ul>
      <li><strong>Name</strong>：邏輯名稱，本外掛會根據這個名字派發動作。約定的名字一般是 <code>Head</code> 與 <code>Body</code>，對應模型的「頭」與「身體」區域。</li>
      <li><strong>Id</strong>：在 Cubism Editor 裡為該 ArtMesh 取的 ID。在 Editor 中選取網格 → 右側檢查器可看到 / 修改此 ID。</li>
  </ul>
  
  <h2>2. HitArea 與 motion 群組的對應關係</h2>
  <p>本外掛的派發規則與 Live2D 官方 CubismWebSamples 一致：</p>
  <table>
      <thead>
          <tr><th style="width:20%">點擊的 HitArea</th><th>觸發的 motion 群組</th><th>需要在 model3.json 的 Motions 中存在哪個 group</th></tr>
      </thead>
      <tbody>
          <tr><td><code>Head</code></td><td>表情切換（隨機一個 expression）</td><td><code>Expressions</code> 欄位（不是 Motions）</td></tr>
          <tr><td><code>Body</code></td><td>觸碰身體動作群組</td><td><code>Motions.TapBody</code></td></tr>
      </tbody>
  </table>
  <p>若您的 model3.json 裡沒有 <code>Expressions</code> / <code>TapBody</code>，對應區域點了也不會有反應，但不會報錯。</p>
  
  <h2>3. 在 Cubism Editor 裡怎麼把一塊 ArtMesh 標為 HitArea？</h2>
  <ol>
      <li>開啟 .cmo3 專案，進入 <strong>建模</strong> 檢視。</li>
      <li>選取您想作為命中區的 ArtMesh（一般是覆蓋頭部 / 身體的那一片網格）。</li>
      <li>右側檢查器 → <strong>ID</strong>，記下或改成易辨識的 ID（例如 <code>HitAreaHead</code>）。</li>
      <li>匯出 <code>.moc3</code> 時勾選「嵌入紋理圖集」並產生 <code>.model3.json</code>。</li>
      <li>用文字編輯器開啟 <code>.model3.json</code>，在 <code>HitAreas</code> 陣列加一條 <code>{ "Name": "Head", "Id": "HitAreaHead" }</code>（若匯出時已勾「含 HitArea」，Editor 會自動寫入）。</li>
  </ol>
  
  <h2>4. 除錯技巧</h2>
  <ul>
      <li>若點擊沒反應，請先看瀏覽器主控台是否有 motion / expression 載入失敗的錯誤。</li>
      <li>HitArea 的命中是基於 ArtMesh 的 <em>實際可見網格</em>，若該 ArtMesh 不透明度為 0（被您藏起來），它仍占著那塊命中盒；這通常是「明明沒看到東西卻點得到」的原因。</li>
      <li>不同模型作者命名不一致：有的把頭標成 <code>HitAreaHead</code>，有的標 <code>head</code>，甚至有人把每個 HitArea 都取名 <code>HitArea</code>。本外掛按 <strong>Name</strong> 派發，所以請確保 Name 為 <code>Head</code> 或 <code>Body</code>。</li>
  </ul>
  
  <h2>5. 進階閱讀</h2>
  <ul>
      <li>Live2D 官方文件：<a href="https://docs.live2d.com/zh-CHS/cubism-editor-manual/hit-area/" target="_blank" rel="noopener">命中區域設定（Cubism Editor）</a></li>
      <li>Live2D 官方文件：<a href="https://docs.live2d.com/zh-CHS/cubism-sdk-manual/json-model3/" target="_blank" rel="noopener">model3.json 檔案規範</a></li>
      <li>本外掛 V2 載入器原始碼：<code>live2d_sdk/src/v2/lapplive2dmanager.ts</code> 與 <code>lappmodel.ts</code></li>
  </ul>
  
  <p>若有需求，歡迎在 <a href="https://github.com/jiangweifang/wp-live2d/issues" target="_blank" rel="noopener">GitHub Issues</a> 中回報，會持續補充更具體的範例（包括如何把 HitArea 派發到自訂動作群組）。</p>
