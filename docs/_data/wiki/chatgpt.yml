# Multi-language body for /wiki/chatgpt.html (and /<lang>/wiki/chatgpt.html).
# Edit here, the 4 stub HTML files just include this via _includes/wiki-body.html.
'zh-CN': |
  
  <p>感谢您使用我的插件。</p>
  
  <h2>功能与默认配额</h2>
  <ul>
      <li>本插件中提供了 ChatGPT 的功能，您可以通过点击机器人和 ChatGPT 进行交互。由于 ChatGPT 是付费 API，作者免费提供的默认通道有配额限制，不希望被滥用，所以默认代码里把 <code>MaxTokens</code> 限制得比较小。</li>
      <li>如果你需要更长的回答 / 更多上下文，请按下面「自定义为自己的 Open AI API」一节，把接口换成自己的 Azure OpenAI 或 Open AI 官方 API。</li>
  </ul>
  
  <p>当前默认设置为：<code>"MaxTokens": 200</code>（最大不超过 4000）。</p>
  
  <p>历史对话保留<strong>最近 5 轮往复</strong>（5 次「我说 + AI 回」共 10 条作为上下文），早于此的对话会被丢弃以控制成本。例如：</p>
  <pre><code>我：你好
  AI：你好，有什么可以帮你
  我：使命召唤是一个什么游戏？
  AI：使命召唤是一个 FPS 游戏。</code></pre>
  <p>以上是 2 轮。</p>
  
  <p>其他要点：</p>
  <ul>
      <li>对话框里的内容支持 <strong>Markdown 渲染</strong>（链接、加粗、列表等）；点击 AI 输出的链接可以跳到你站点其他页面。</li>
      <li>从 1.9.16 起，提示气泡会<strong>向上扩展</strong>而不是向下，方便显示长回复。</li>
      <li>插件提供的免费通道目前服务器在上海，无法直连 OpenAI 官方接口；作者用的是个人 Azure OpenAI 通道。</li>
  </ul>
  
  <h2>自定义为自己的 Open AI API</h2>
  <p>您可以通过<a href="https://www.live2dweb.com/Sites" target="_blank" rel="noopener">后台设置</a>将其修改为自己使用的 Open AI API。</p>
  
  <p>目前支持 Azure OpenAI 和 Open AI 官方接口，可以使用 <code>gpt-3.5-turbo</code>、<code>GPT-3.5-Turbo-0613</code> 和 <code>GPT-4</code>。</p>
  
  <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/7ce6ce71-8814-44ac-9f0f-432ded2a4f83" alt="后台 ChatGPT 设置" /></p>
  
  <h2>Azure OpenAI 设置</h2>
  
  <h3>1. Api Key 和 Endpoint（节点）</h3>
  <blockquote>
      <p>在 Azure 后台 <em>Keys and Endpoint</em> 中可以获取 Key 和 Endpoint。</p>
      <p>如下图所示，Key 可以二选一；Endpoint 终结点是您这个实例的名称，而 <strong>不是</strong> 下面那个节点网址。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/a914ea54-47d2-4f38-bd0d-993742bd8c59" alt="Azure Keys and Endpoint" /></p>
  </blockquote>
  
  <h3>2. Model Name（部署的模型名称）</h3>
  <blockquote>
      <p>进入 <a href="https://oai.azure.com/portal/" target="_blank" rel="noopener">https://oai.azure.com/portal/</a></p>
      <p>创建模型后可以在 <em>Deployments</em> 中看到 Deployment Name。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/33fb36d2-12f6-4852-b328-cf6bbe957184" alt="Azure Deployments" /></p>
      <p>将此名称放入 Model Name（部署的模型名称）中即可。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/4c6986d8-4592-4680-8732-4ea99984b4e5" alt="填写 Model Name" /></p>
  </blockquote>
  
  <h3>3. Version（版本）</h3>
  <blockquote>
      <p>请参阅 <a href="https://learn.microsoft.com/zh-cn/azure/ai-services/openai/concepts/models#update--deploy-models-via-the-api" target="_blank" rel="noopener">Azure OpenAI 模型版本文档</a>。</p>
      <p>当前所示的最新版本为 <code>2023-05-01</code>，可以填写此固定值。</p>
  </blockquote>
'en': |
  
  <p>Thanks for using the plugin.</p>
  
  <h2>Feature and default quota</h2>
  <ul>
      <li>The plugin includes a ChatGPT feature: clicking the character lets you chat with ChatGPT. Because the ChatGPT API is paid, the free channel the author provides has a quota and we do not want it abused, so by default <code>MaxTokens</code> is kept fairly small.</li>
      <li>If you want longer answers / more context, follow the section "Plug in your own Open AI API" below to swap the endpoint to your own Azure OpenAI or official Open AI API.</li>
  </ul>
  
  <p>The current default is <code>"MaxTokens": 200</code> (cap is 4000).</p>
  
  <p>The conversation history keeps the <strong>most recent 5 turns</strong> ("you say + AI replies" — 10 messages total) as context; anything older is dropped to control cost. For example:</p>
  <pre><code>Me: hi
  AI: hello, how can I help?
  Me: what kind of game is Call of Duty?
  AI: Call of Duty is an FPS game.</code></pre>
  <p>That's 2 turns.</p>
  
  <p>Other notes:</p>
  <ul>
      <li>Messages in the bubble support <strong>Markdown rendering</strong> (links, bold, lists, …); clicking links produced by the AI navigates to other pages on your site.</li>
      <li>Since 1.9.16, the tip bubble <strong>expands upward</strong> instead of downward, which makes long replies easier to read.</li>
      <li>The free channel's server is currently in Shanghai and cannot reach the official OpenAI API directly; the author uses a personal Azure OpenAI channel.</li>
  </ul>
  
  <h2>Plug in your own Open AI API</h2>
  <p>You can switch to your own Open AI API on the <a href="https://www.live2dweb.com/Sites" target="_blank" rel="noopener">backend settings page</a>.</p>
  
  <p>Both Azure OpenAI and the official Open AI API are supported, including <code>gpt-3.5-turbo</code>, <code>GPT-3.5-Turbo-0613</code> and <code>GPT-4</code>.</p>
  
  <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/7ce6ce71-8814-44ac-9f0f-432ded2a4f83" alt="ChatGPT settings in the backend" /></p>
  
  <h2>Azure OpenAI setup</h2>
  
  <h3>1. API Key and Endpoint</h3>
  <blockquote>
      <p>The Key and Endpoint can be found under <em>Keys and Endpoint</em> in the Azure portal.</p>
      <p>As shown below, either Key works; the Endpoint is the name of <em>this instance</em>, <strong>not</strong> the regional endpoint URL listed beneath it.</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/a914ea54-47d2-4f38-bd0d-993742bd8c59" alt="Azure Keys and Endpoint" /></p>
  </blockquote>
  
  <h3>2. Model Name (deployment name)</h3>
  <blockquote>
      <p>Go to <a href="https://oai.azure.com/portal/" target="_blank" rel="noopener">https://oai.azure.com/portal/</a>.</p>
      <p>After creating a model, the Deployment Name appears under <em>Deployments</em>.</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/33fb36d2-12f6-4852-b328-cf6bbe957184" alt="Azure Deployments" /></p>
      <p>Put that name into the Model Name (deployment name) field.</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/4c6986d8-4592-4680-8732-4ea99984b4e5" alt="Filling in Model Name" /></p>
  </blockquote>
  
  <h3>3. Version</h3>
  <blockquote>
      <p>See the <a href="https://learn.microsoft.com/azure/ai-services/openai/concepts/models#update--deploy-models-via-the-api" target="_blank" rel="noopener">Azure OpenAI model versions doc</a>.</p>
      <p>At time of writing the latest version is <code>2023-05-01</code>; you can use that fixed value.</p>
  </blockquote>
'ja': |
  
  <p>本プラグインをご利用いただきありがとうございます。</p>
  
  <h2>機能と既定の割当</h2>
  <ul>
      <li>本プラグインは ChatGPT 機能を提供しており、キャラをクリックすることで ChatGPT と対話できます。ChatGPT は有償 API のため、作者が無料提供している既定チャネルには上限があり、悪用されたくないので既定の <code>MaxTokens</code> はかなり小さく設定してあります。</li>
      <li>もっと長い回答 / もっと長いコンテキストが必要なら、下の「自分の Open AI API に差し替える」を参照して、エンドポイントを自身の Azure OpenAI または公式 Open AI API に切り替えてください。</li>
  </ul>
  
  <p>現在の既定値は <code>"MaxTokens": 200</code>(上限は 4000)です。</p>
  
  <p>履歴は<strong>直近 5 ターン</strong>(「私 + AI」5 往復、計 10 メッセージ)を保持し、それより古いものはコスト抑制のため破棄されます。例:</p>
  <pre><code>私:こんにちは
  AI:こんにちは、何をお手伝いしましょう?
  私:Call of Duty とはどんなゲームですか?
  AI:Call of Duty は FPS ゲームです。</code></pre>
  <p>これで 2 ターンです。</p>
  
  <p>その他のポイント:</p>
  <ul>
      <li>バブル内のテキストは <strong>Markdown 描画</strong>(リンク・太字・リスト等)に対応。AI が出力したリンクをクリックすると、自サイト内の他ページに遷移できます。</li>
      <li>1.9.16 以降、提示バブルは下方向ではなく <strong>上方向</strong> に伸びるため、長い回答が読みやすくなりました。</li>
      <li>無料チャネルのサーバは現在上海にあり、OpenAI の公式 API へ直接アクセスできません。作者は個人の Azure OpenAI チャネルを利用しています。</li>
  </ul>
  
  <h2>自分の Open AI API に差し替える</h2>
  <p><a href="https://www.live2dweb.com/Sites" target="_blank" rel="noopener">バックエンド設定ページ</a> から、自分の Open AI API に切り替えることができます。</p>
  
  <p>Azure OpenAI と公式 Open AI API の両方をサポートしており、<code>gpt-3.5-turbo</code>、<code>GPT-3.5-Turbo-0613</code>、<code>GPT-4</code> などが使えます。</p>
  
  <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/7ce6ce71-8814-44ac-9f0f-432ded2a4f83" alt="バックエンドの ChatGPT 設定" /></p>
  
  <h2>Azure OpenAI の設定</h2>
  
  <h3>1. API Key とエンドポイント</h3>
  <blockquote>
      <p>Azure ポータルの <em>Keys and Endpoint</em> から Key と Endpoint を取得できます。</p>
      <p>下図の通り、Key はどちらでも構いません。Endpoint は<em>このインスタンス</em>の名前であり、その下にあるリージョナル URL では<strong>ありません</strong>。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/a914ea54-47d2-4f38-bd0d-993742bd8c59" alt="Azure Keys and Endpoint" /></p>
  </blockquote>
  
  <h3>2. Model Name(デプロイ名)</h3>
  <blockquote>
      <p><a href="https://oai.azure.com/portal/" target="_blank" rel="noopener">https://oai.azure.com/portal/</a> へアクセス。</p>
      <p>モデル作成後、<em>Deployments</em> に Deployment Name が表示されます。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/33fb36d2-12f6-4852-b328-cf6bbe957184" alt="Azure Deployments" /></p>
      <p>その名前を Model Name(デプロイ名)欄に入れてください。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/4c6986d8-4592-4680-8732-4ea99984b4e5" alt="Model Name 入力" /></p>
  </blockquote>
  
  <h3>3. Version</h3>
  <blockquote>
      <p><a href="https://learn.microsoft.com/ja-jp/azure/ai-services/openai/concepts/models#update--deploy-models-via-the-api" target="_blank" rel="noopener">Azure OpenAI モデルバージョン ドキュメント</a> を参照してください。</p>
      <p>現時点での最新バージョンは <code>2023-05-01</code> で、この固定値を入力すれば構いません。</p>
  </blockquote>
