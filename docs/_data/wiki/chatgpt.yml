  <p>感謝您使用我的外掛。</p>
  
  <h2>功能與預設配額</h2>
  <ul>
      <li>本外掛中提供了 ChatGPT 功能，您可以透過點擊機器人和 ChatGPT 互動。由於 ChatGPT 是付費 API，作者免費提供的預設通道有配額限制，不希望被濫用，所以預設程式碼中把 <code>MaxTokens</code> 限制得比較小。</li>
      <li>若您需要更長的回答 / 更多上下文，請依下方「自訂為自己的 Open AI API」一節，把端點換成自己的 Azure OpenAI 或 Open AI 官方 API。</li>
  </ul>
  
  <p>目前預設為：<code>"MaxTokens": 200</code>（最大不超過 4000）。</p>
  
  <p>對話歷史保留<strong>最近 5 輪往復</strong>（5 次「我說 + AI 回」共 10 條作為上下文），早於此的對話會被丟棄以控制成本。例如：</p>
  <pre><code>我：你好
  AI：你好，有什麼可以幫你
  我：使命召喚是什麼遊戲？
  AI：使命召喚是一款 FPS 遊戲。</code></pre>
  <p>以上是 2 輪。</p>
  
  <p>其他要點：</p>
  <ul>
      <li>對話框內容支援 <strong>Markdown 渲染</strong>（連結、粗體、列表等）；點擊 AI 輸出的連結可跳到您站台其他頁面。</li>
      <li>自 1.9.16 起，提示氣泡會<strong>向上擴展</strong>而不是向下，方便顯示長回覆。</li>
      <li>外掛提供的免費通道目前伺服器在上海，無法直連 OpenAI 官方介面；作者使用的是個人 Azure OpenAI 通道。</li>
