  <h2>自訂為自己的 Open AI API</h2>
  <p>您可以透過<a href="https://www.live2dweb.com/Sites" target="_blank" rel="noopener">後台設定</a>將其修改為自己使用的 Open AI API。</p>
  
  <p>目前支援 Azure OpenAI 與 Open AI 官方介面，可使用 <code>gpt-3.5-turbo</code>、<code>GPT-3.5-Turbo-0613</code> 與 <code>GPT-4</code>。</p>
  
  <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/7ce6ce71-8814-44ac-9f0f-432ded2a4f83" alt="後台 ChatGPT 設定" /></p>
  
  <h2>Azure OpenAI 設定</h2>
  
  <h3>1. API Key 與 Endpoint（端點）</h3>
  <blockquote>
      <p>在 Azure 後台 <em>Keys and Endpoint</em> 中可取得 Key 與 Endpoint。</p>
      <p>如下圖所示，Key 可以二選一；Endpoint 是您這個執行個體的名稱，而 <strong>不是</strong> 下方的區域端點 URL。</p>
      <p><img src="https://github.com/jiangweifang/wp-live2d/assets/38683169/a914ea54-47d2-4f38-bd0d-993742bd8c59" alt="Azure Keys and Endpoint" /></p>
  </blockquote>
  
  <h3>2. Model Name（部署的模型名稱）</h3>
  <blockquote>
      <p>進入 <a href="https://oai.azure.com/portal/" target="_blank" rel="noopener">https://oai.azure.com/portal/</a></p>
