# Multi-language body for /wiki/chrome-extension.html (and /<lang>/wiki/chrome-extension.html).
# Edit here, the 4 stub HTML files just include this via _includes/wiki-body.html.
'zh-CN': |
  
  <p>除了 WordPress 插件，本项目还提供一个 Chrome / Edge 浏览器扩展 <strong>Live2D Web Canvas</strong>，让你在<em>任何网页</em>右下角都能挂一个看板娘。它和 WordPress 插件是<strong>两个独立产品</strong>，登录账号通用，但配置完全分开。</p>
  
  <h2>1. 它能做什么？</h2>
  <ul>
      <li>在你访问的任何网站右下角挂一个 Live2D 看板娘（不读取所在网页的任何内容，仅根据鼠标位置做朝向动画 —— <a href="{{ '/privacy/extension.html' | relative_url }}">详见隐私政策</a>）。</li>
      <li>开箱自带几款经典 V1 模型（22 娘 / 33 娘、Pio / Tia、Shizuku、舰これ Murakumo、超次元海王星等），下载到 IndexedDB 离线使用。</li>
      <li>登录付费账号后，可以填自己的 <code>modelAPI</code> 加载 V2（Cubism 4+）模型。</li>
      <li>可调头部锚点、缩放倍数、看板娘位置、画布尺寸、提示气泡频率、工具栏按钮等。</li>
  </ul>
  
  <h2>2. 安装</h2>
  <p>从 Chrome Web Store / Edge 加载项中搜索 <strong>Live2D Web Canvas</strong> 安装即可。安装后地址栏右侧会出现扩展图标，点开可以打开 popup（快捷开关）或进入「选项」页（完整设置）。</p>
  
  <h2>3. 登录（仅在使用 V2 时需要）</h2>
  <p>选项页 → <strong>登录</strong> 标签 → 「使用网页登录」。它会跳转到 <code>https://www.live2dweb.com/SingleLogin</code> 完成登录，登录成功后页面会自动关闭并把访问令牌写入 <code>chrome.storage.local</code>。</p>
  <ul>
      <li>登录态<strong>仅本地</strong>，不会跨设备同步。</li>
      <li>仅在你主动登录时才会发生网络请求，扩展不收集你访问的网页 URL / 标题。</li>
      <li>退出登录会清除本地令牌。</li>
  </ul>
  <p>如果你只想用免费的 V1 模型，<strong>无需登录</strong>。</p>
  
  <h2>4. 模型设置</h2>
  <p>选项页 → <strong>基础设置</strong> → 模型 → <strong>模型来源</strong>，是一个二选一下拉：</p>
  <table>
      <thead>
          <tr><th style="width:24%">模型来源</th><th>含义</th><th style="width:14%">付费？</th></tr>
      </thead>
      <tbody>
          <tr><td>本地模型（V1）</td><td>从扩展自带的 V1 模型库中选一个已下载的模型 + 一套贴图。先去「V1 模型库」标签把想用的模型下载下来。</td><td>免费</td></tr>
          <tr><td>自定义 URL（付费）</td><td>填一个你自己的 <code>modelAPI</code>，加载 V2（Cubism 4+）模型。两种填法与 WordPress 插件一致：直链 <code>.json</code> 或目录根 <code>/</code> + <code>modelDir</code> 列表。</td><td>需要登录 + 付费</td></tr>
      </tbody>
  </table>
  
  <h3>4.1 V1 模型库</h3>
  <p>选项页 → <strong>V1 模型库</strong> 标签：列出所有可用的 V1 模型（带 64×64 缩略图、状态徽章），点「下载」会把模型文件存到浏览器的 IndexedDB（不会上传到任何服务器）。</p>
  <ul>
      <li><strong>多贴图型</strong>（如 22 娘 / 33 娘 / Pio / Tia）：单个 model.moc + 多套贴图，下方 Texture ID 下拉就是从 <code>*.textures.json</code> 解析出来的贴图组。</li>
      <li><strong>多皮肤型</strong>（如超次元海王星 / 舰これ / Shizuku Talk）：每个"皮肤"是一个独立的子模型（各自的 model.moc），Texture ID 下拉里列出的是子目录名。</li>
  </ul>
  
  <h3>4.2 自定义 URL（V2）</h3>
  <p>登录付费账号后，模型来源选「自定义 URL（付费）」，下方会出现 <code>modelAPI</code> 和 <code>modelDir</code> 两个输入。填法和 WordPress 插件完全一致 —— 看 <a href="{{ '/wiki/custom-model.html' | relative_url }}">V2 自定义模型教程的第 3 节</a>。</p>
  <p>目前浏览器扩展端<strong>没有</strong>「缓存到本地 / 防盗链」开关。扩展是直接从 <code>modelAPI</code> 拉模型加载，所以请保证 <code>modelAPI</code> 本身就支持 CORS（必须允许 <code>chrome-extension://...</code> 或 <code>*</code> 作为 Origin）。</p>
  
  <h2>5. 其他设置 tab</h2>
  <ul>
      <li><strong>基础设置</strong>：启用开关、模型、头部锚点 (headPos)、模型缩放、看板娘位置 (X/Y)、画布尺寸。</li>
      <li><strong>工具栏设置</strong>：右下角小工具按钮（截图、切换、设置等）的开关。</li>
      <li><strong>提示消息选项</strong>：默认提示文案、触发频率。</li>
      <li><strong>高级设置</strong>：开发调试用，一般不用动。</li>
      <li><strong>V1 模型库</strong>：上面已经讲过。</li>
  </ul>
  
  <h2>6. 与 WordPress 插件的关系</h2>
  <table>
      <thead>
          <tr><th></th><th>WordPress 插件</th><th>浏览器扩展</th></tr>
      </thead>
      <tbody>
          <tr><td>挂在哪里</td><td>你自己的 WP 站点</td><td>用户浏览器，所有网页</td></tr>
          <tr><td>谁来配置</td><td>站长（一次配置全站生效）</td><td>每个用户在自己浏览器配</td></tr>
          <tr><td>V1 模型来源</td><td>插件内置 + 远程创意工坊</td><td>扩展内置（IndexedDB 缓存）</td></tr>
          <tr><td>V2 自定义 URL</td><td>付费 + 「缓存到本地」可选</td><td>付费，无本地缓存（直连）</td></tr>
          <tr><td>账号</td><td colspan="2">同一个 live2dweb.com 账号，但授权令牌互不共享，需要分别登录</td></tr>
      </tbody>
  </table>
  
  <h2>7. 隐私</h2>
  <p>扩展<strong>不读取</strong>你访问的网页 URL、内容、Cookie、表单或浏览历史，<strong>不收集</strong>地理位置 / IP / 设备指纹 / 健康信息 / 通讯内容。完整的数据使用清单见 <a href="{{ '/privacy/extension.html' | relative_url }}">浏览器扩展隐私政策</a>。</p>
'en': |
  
  <p>Besides the WordPress plugin, this project also ships a Chrome / Edge browser extension called <strong>Live2D Web Canvas</strong> that pins a Live2D character to the bottom-right of <em>any</em> webpage. The extension and the WordPress plugin are <strong>two independent products</strong>; they share the same login account but their settings are completely separate.</p>
  
  <h2>1. What can it do?</h2>
  <ul>
      <li>Pin a Live2D character to the bottom-right corner of every site you visit (it does not read anything from the host page; it only animates the character based on the live mouse position — <a href="{{ '/en/privacy/extension.html' | relative_url }}">see the privacy policy</a>).</li>
      <li>Ships with several classic V1 models (22-musume / 33-musume, Pio / Tia, Shizuku, Kantai-Collection Murakumo, Hyperdimension Neptunia, …) downloadable into IndexedDB for offline use.</li>
      <li>Once you sign in to a paid account, you can plug in your own <code>modelAPI</code> to load V2 (Cubism 4+) models.</li>
      <li>Adjustable head anchor, scale, character position, canvas size, tip-bubble frequency, toolbar buttons, etc.</li>
  </ul>
  
  <h2>2. Installation</h2>
  <p>Search for <strong>Live2D Web Canvas</strong> on the Chrome Web Store / Edge add-ons store and install it. After installation an extension icon appears next to the address bar; clicking it opens the popup (quick toggles), or you can open the full Options page.</p>
  
  <h2>3. Sign in (only required for V2)</h2>
  <p>Options page → <strong>Login</strong> tab → "Sign in via web". It opens <code>https://www.live2dweb.com/SingleLogin</code>, and once you complete the login the page closes automatically and writes the access token into <code>chrome.storage.local</code>.</p>
  <ul>
      <li>The login session is <strong>local only</strong>; it is never synced across devices.</li>
      <li>Network requests only happen when you explicitly sign in. The extension never collects URLs / titles of pages you visit.</li>
      <li>Signing out clears the local token.</li>
  </ul>
  <p>If you only want the free V1 models, <strong>no sign-in is needed</strong>.</p>
  
  <h2>4. Model settings</h2>
  <p>Options page → <strong>Basic settings</strong> → Model → <strong>Model source</strong> is a two-way dropdown:</p>
  <table>
      <thead>
          <tr><th style="width:24%">Model source</th><th>Meaning</th><th style="width:14%">Paid?</th></tr>
      </thead>
      <tbody>
          <tr><td>Local model (V1)</td><td>Pick a downloaded model + texture set from the bundled V1 library. First go to the "V1 Library" tab and download the model you want.</td><td>Free</td></tr>
          <tr><td>Custom URL (paid)</td><td>Plug in your own <code>modelAPI</code> to load V2 (Cubism 4+) models. Same two forms as the WordPress plugin: a direct <code>.json</code> link, or a directory root <code>/</code> + <code>modelDir</code> list.</td><td>Sign-in + payment required</td></tr>
      </tbody>
  </table>
  
  <h3>4.1 V1 model library</h3>
  <p>Options page → <strong>V1 Library</strong> tab: lists every available V1 model (with 64×64 thumbnails and status badges). Clicking "Download" stores the model files into the browser's IndexedDB (nothing is uploaded anywhere).</p>
  <ul>
      <li><strong>Multi-texture type</strong> (e.g. 22-musume / 33-musume / Pio / Tia): a single model.moc with multiple texture sets — the Texture ID dropdown is parsed from <code>*.textures.json</code>.</li>
      <li><strong>Multi-skin type</strong> (e.g. Hyperdimension Neptunia / Kantai-Collection / Shizuku Talk): each "skin" is a separate sub-model with its own model.moc; the Texture ID dropdown lists the sub-directory names.</li>
  </ul>
  
  <h3>4.2 Custom URL (V2)</h3>
  <p>After signing in to a paid account, set Model source to "Custom URL (paid)"; <code>modelAPI</code> and <code>modelDir</code> inputs appear. The fill-in rules are identical to the WordPress plugin — see <a href="{{ '/en/wiki/custom-model.html' | relative_url }}">section 3 of the V2 custom model guide</a>.</p>
  <p>The browser extension currently has <strong>no</strong> "cache locally / hotlink protection" switch. The extension fetches the model directly from <code>modelAPI</code>, so make sure CORS allows <code>chrome-extension://...</code> (or <code>*</code>) as an Origin.</p>
  
  <h2>5. Other settings tabs</h2>
  <ul>
      <li><strong>Basic settings</strong>: enable toggle, model, head anchor (headPos), model scale, character X/Y position, canvas size.</li>
      <li><strong>Toolbar settings</strong>: toggles for the small toolbar buttons (screenshot, switch, settings, …).</li>
      <li><strong>Tip messages</strong>: default tip strings and trigger frequency.</li>
      <li><strong>Advanced</strong>: developer / debug — usually no need to touch.</li>
      <li><strong>V1 Library</strong>: described above.</li>
  </ul>
  
  <h2>6. Relationship with the WordPress plugin</h2>
  <table>
      <thead>
          <tr><th></th><th>WordPress plugin</th><th>Browser extension</th></tr>
      </thead>
      <tbody>
          <tr><td>Where it runs</td><td>Your own WP site</td><td>The user's browser, every page</td></tr>
          <tr><td>Who configures it</td><td>The site owner (one config for the whole site)</td><td>Each user, in their own browser</td></tr>
          <tr><td>V1 model source</td><td>Bundled + remote workshop</td><td>Bundled (IndexedDB cache)</td></tr>
          <tr><td>V2 custom URL</td><td>Paid + optional "cache locally"</td><td>Paid, no local cache (direct fetch)</td></tr>
          <tr><td>Account</td><td colspan="2">Same live2dweb.com account, but the access tokens are not shared — you sign in to each one separately</td></tr>
      </tbody>
  </table>
  
  <h2>7. Privacy</h2>
  <p>The extension does <strong>not</strong> read URLs, content, cookies, form data or browsing history of pages you visit, and does <strong>not</strong> collect geolocation / IP / device fingerprints / health info / communications. The full data-usage disclosure is in the <a href="{{ '/en/privacy/extension.html' | relative_url }}">browser extension privacy policy</a>.</p>
'ja': |
  
  <p>WordPress プラグイン以外に、本プロジェクトでは Chrome / Edge ブラウザ拡張 <strong>Live2D Web Canvas</strong> も提供しており、<em>任意のウェブページ</em>の右下隅に Live2D キャラクターを表示できます。WordPress プラグインとは<strong>独立した 2 つの製品</strong>で、ログインアカウントは共通ですが設定は完全に別管理です。</p>
  
  <h2>1. 何ができるのか?</h2>
  <ul>
      <li>あなたが訪れる任意のサイトの右下隅に Live2D キャラを表示します(ホストページの内容は一切読まず、マウス位置のみで向きアニメーションを行います ── <a href="{{ '/ja/privacy/extension.html' | relative_url }}">プライバシーポリシー参照</a>)。</li>
      <li>定番の V1 モデルを同梱(22 娘 / 33 娘、Pio / Tia、Shizuku、艦これ Murakumo、超次元ネプテューヌなど)、IndexedDB に保存してオフライン利用可。</li>
      <li>有償アカウントにログインすれば、自分の <code>modelAPI</code> を入力して V2(Cubism 4+)モデルを読み込めます。</li>
      <li>頭部アンカー、表示倍率、キャラ位置、キャンバスサイズ、提示バブルの頻度、ツールバーボタン等を調整可。</li>
  </ul>
  
  <h2>2. インストール</h2>
  <p>Chrome Web Store / Edge アドオンストアで <strong>Live2D Web Canvas</strong> を検索してインストールしてください。インストール後、アドレスバー右側に拡張アイコンが現れ、クリックでポップアップ(クイックトグル)を表示、または「オプション」ページ(完全な設定)を開けます。</p>
  
  <h2>3. ログイン(V2 を使う場合のみ必要)</h2>
  <p>オプションページ → <strong>ログイン</strong> タブ →「Web ログインを使う」。<code>https://www.live2dweb.com/SingleLogin</code> へ遷移し、ログインが完了するとページが自動的に閉じ、アクセストークンが <code>chrome.storage.local</code> に書き込まれます。</p>
  <ul>
      <li>ログイン状態は<strong>ローカル限定</strong>で、デバイス間同期はされません。</li>
      <li>ネットワークアクセスはユーザーが明示的にログインした場合のみ発生します。拡張は閲覧 URL / タイトルを収集しません。</li>
      <li>ログアウトすればローカルトークンは削除されます。</li>
  </ul>
  <p>無料の V1 モデルだけ使うなら<strong>ログインは不要</strong>です。</p>
  
  <h2>4. モデル設定</h2>
  <p>オプションページ → <strong>基本設定</strong> → モデル → <strong>モデルソース</strong> は 2 値のドロップダウンです:</p>
  <table>
      <thead>
          <tr><th style="width:24%">モデルソース</th><th>意味</th><th style="width:14%">有償?</th></tr>
      </thead>
      <tbody>
          <tr><td>ローカルモデル(V1)</td><td>同梱 V1 モデルライブラリからダウンロード済みのモデル + テクスチャを選択。先に「V1 ライブラリ」タブで使いたいモデルをダウンロードしてください。</td><td>無料</td></tr>
          <tr><td>カスタム URL(有償)</td><td>自分の <code>modelAPI</code> を入力して V2(Cubism 4+)モデルをロード。記法は WordPress プラグインと同じ:<code>.json</code> 直リンク、または <code>/</code> で終わるディレクトリルート + <code>modelDir</code> 一覧。</td><td>ログイン + 有償</td></tr>
      </tbody>
  </table>
  
  <h3>4.1 V1 モデルライブラリ</h3>
  <p>オプションページ → <strong>V1 ライブラリ</strong> タブ:利用可能な V1 モデル一覧(64×64 サムネイル + ステータスバッジ)が表示されます。「ダウンロード」を押すとモデルファイルがブラウザの IndexedDB に保存されます(どこにもアップロードされません)。</p>
  <ul>
      <li><strong>マルチテクスチャ型</strong>(22 娘 / 33 娘 / Pio / Tia など):単一の model.moc に複数のテクスチャセット。Texture ID ドロップダウンは <code>*.textures.json</code> から解析されたもの。</li>
      <li><strong>マルチスキン型</strong>(超次元ネプテューヌ / 艦これ / Shizuku Talk など):各「スキン」が独立サブモデル(各々の model.moc)、Texture ID ドロップダウンにはサブディレクトリ名が並びます。</li>
  </ul>
  
  <h3>4.2 カスタム URL(V2)</h3>
  <p>有償アカウントでログイン後、モデルソースを「カスタム URL(有償)」にすると、<code>modelAPI</code> と <code>modelDir</code> の入力欄が現れます。記法は WordPress プラグインと完全に同じ ── <a href="{{ '/ja/wiki/custom-model.html' | relative_url }}">V2 カスタムモデルガイド第 3 節</a>を参照してください。</p>
  <p>ブラウザ拡張側には現在「ローカルキャッシュ / 直リンク防止」スイッチは<strong>ありません</strong>。拡張は <code>modelAPI</code> から直接モデルを取得するため、<code>modelAPI</code> 自体が CORS に対応している必要があります(<code>chrome-extension://...</code> または <code>*</code> を Origin として許可してください)。</p>
  
  <h2>5. その他の設定タブ</h2>
  <ul>
      <li><strong>基本設定</strong>:有効/無効、モデル、頭部アンカー(headPos)、モデル倍率、キャラ位置(X/Y)、キャンバスサイズ。</li>
      <li><strong>ツールバー設定</strong>:右下のツールボタン(スクショ・切替・設定など)のオン/オフ。</li>
      <li><strong>提示メッセージ</strong>:既定の提示文言、トリガー頻度。</li>
      <li><strong>高度な設定</strong>:開発・デバッグ用。通常は触らなくて構いません。</li>
      <li><strong>V1 ライブラリ</strong>:上記参照。</li>
  </ul>
  
  <h2>6. WordPress プラグインとの関係</h2>
  <table>
      <thead>
          <tr><th></th><th>WordPress プラグイン</th><th>ブラウザ拡張</th></tr>
      </thead>
      <tbody>
          <tr><td>動作場所</td><td>自分の WP サイト</td><td>ユーザーのブラウザ、すべてのウェブページ</td></tr>
          <tr><td>誰が設定するか</td><td>サイトオーナー(一度の設定で全サイトに反映)</td><td>各ユーザーが各々のブラウザで設定</td></tr>
          <tr><td>V1 モデルソース</td><td>同梱 + リモートワークショップ</td><td>同梱(IndexedDB キャッシュ)</td></tr>
          <tr><td>V2 カスタム URL</td><td>有償 + 「ローカルキャッシュ」オプション</td><td>有償、ローカルキャッシュなし(直接取得)</td></tr>
          <tr><td>アカウント</td><td colspan="2">同じ live2dweb.com アカウントですが、アクセストークンは共有されないため別途ログインが必要</td></tr>
      </tbody>
  </table>
  
  <h2>7. プライバシー</h2>
  <p>拡張は閲覧 URL、ページ内容、Cookie、フォーム入力、ブラウジング履歴を<strong>読み取りません</strong>。位置情報 / IP / デバイス指紋 / 健康情報 / 通信内容も<strong>収集しません</strong>。完全なデータ使用一覧は <a href="{{ '/ja/privacy/extension.html' | relative_url }}">ブラウザ拡張プライバシーポリシー</a> をご覧ください。</p>
'zh-TW': |
  
  <p>除了 WordPress 外掛之外，本專案還提供一個 Chrome / Edge 瀏覽器擴充功能 <strong>Live2D Web Canvas</strong>，讓您在<em>任何網頁</em>右下角都能掛一個看板娘。它與 WordPress 外掛是<strong>兩個獨立產品</strong>，登入帳號通用，但設定完全分開。</p>
  
  <h2>1. 它能做什麼？</h2>
  <ul>
      <li>在您造訪的任何網站右下角掛一個 Live2D 看板娘（不讀取所在網頁的任何內容，僅依滑鼠位置做朝向動畫 —— <a href="{{ '/zh-TW/privacy/extension.html' | relative_url }}">詳見隱私權政策</a>）。</li>
      <li>開箱自帶幾款經典 V1 模型（22 娘 / 33 娘、Pio / Tia、Shizuku、艦これ Murakumo、超次元海王星等），下載到 IndexedDB 離線使用。</li>
      <li>登入付費帳號後，可以填自己的 <code>modelAPI</code> 載入 V2（Cubism 4+）模型。</li>
      <li>可調頭部錨點、縮放倍率、看板娘位置、畫布尺寸、提示氣泡頻率、工具列按鈕等。</li>
  </ul>
  
  <h2>2. 安裝</h2>
  <p>從 Chrome Web Store / Edge 附加元件商店搜尋 <strong>Live2D Web Canvas</strong> 安裝即可。安裝後位址列右側會出現擴充功能圖示，點開可開啟 popup（快速開關）或進入「選項」頁（完整設定）。</p>
  
  <h2>3. 登入（僅在使用 V2 時需要）</h2>
  <p>選項頁 → <strong>登入</strong> 標籤 → 「使用網頁登入」。它會跳轉到 <code>https://www.live2dweb.com/SingleLogin</code> 完成登入，登入成功後頁面會自動關閉並把存取令牌寫入 <code>chrome.storage.local</code>。</p>
  <ul>
      <li>登入狀態<strong>僅本機</strong>，不會跨裝置同步。</li>
      <li>僅在您主動登入時才會發生網路請求，擴充功能不收集您造訪的網頁 URL / 標題。</li>
      <li>登出會清除本機令牌。</li>
  </ul>
  <p>若您只想用免費的 V1 模型，<strong>無需登入</strong>。</p>
  
  <h2>4. 模型設定</h2>
  <p>選項頁 → <strong>基本設定</strong> → 模型 → <strong>模型來源</strong> 是一個二選一下拉：</p>
  <table>
      <thead>
          <tr><th style="width:24%">模型來源</th><th>意義</th><th style="width:14%">付費？</th></tr>
      </thead>
      <tbody>
          <tr><td>本機模型（V1）</td><td>從擴充功能自帶的 V1 模型庫中選一個已下載的模型 + 一套貼圖。先去「V1 模型庫」標籤把想用的模型下載下來。</td><td>免費</td></tr>
          <tr><td>自訂 URL（付費）</td><td>填一個您自己的 <code>modelAPI</code>，載入 V2（Cubism 4+）模型。兩種寫法與 WordPress 外掛一致：直連 <code>.json</code> 或目錄根 <code>/</code> + <code>modelDir</code> 列表。</td><td>需要登入 + 付費</td></tr>
      </tbody>
  </table>
  
  <h3>4.1 V1 模型庫</h3>
  <p>選項頁 → <strong>V1 模型庫</strong> 標籤：列出所有可用的 V1 模型（帶 64×64 縮圖、狀態徽章），點「下載」會把模型檔案存到瀏覽器的 IndexedDB（不會上傳到任何伺服器）。</p>
  <ul>
      <li><strong>多貼圖型</strong>（如 22 娘 / 33 娘 / Pio / Tia）：單一 model.moc + 多套貼圖，下方 Texture ID 下拉是從 <code>*.textures.json</code> 解析出來的貼圖組。</li>
      <li><strong>多面板型</strong>（如超次元海王星 / 艦これ / Shizuku Talk）：每個「面板」是獨立的子模型（各自的 model.moc），Texture ID 下拉裡列出的是子目錄名。</li>
  </ul>
  
  <h3>4.2 自訂 URL（V2）</h3>
  <p>登入付費帳號後，模型來源選「自訂 URL（付費）」，下方會出現 <code>modelAPI</code> 與 <code>modelDir</code> 兩個輸入。寫法與 WordPress 外掛完全一致 —— 看 <a href="{{ '/zh-TW/wiki/custom-model.html' | relative_url }}">V2 自訂模型教學的第 3 節</a>。</p>
  <p>目前瀏覽器擴充功能端<strong>沒有</strong>「快取至本機 / 防盜連」開關。擴充功能是直接從 <code>modelAPI</code> 拉模型載入，所以請保證 <code>modelAPI</code> 本身就支援 CORS（必須允許 <code>chrome-extension://...</code> 或 <code>*</code> 作為 Origin）。</p>
  
  <h2>5. 其他設定 tab</h2>
  <ul>
      <li><strong>基本設定</strong>：啟用開關、模型、頭部錨點 (headPos)、模型縮放、看板娘位置 (X/Y)、畫布尺寸。</li>
      <li><strong>工具列設定</strong>：右下角小工具按鈕（截圖、切換、設定等）的開關。</li>
      <li><strong>提示訊息選項</strong>：預設提示文案、觸發頻率。</li>
      <li><strong>進階設定</strong>：開發除錯用，一般不用動。</li>
      <li><strong>V1 模型庫</strong>：上面已經講過。</li>
  </ul>
  
  <h2>6. 與 WordPress 外掛的關係</h2>
  <table>
      <thead>
          <tr><th></th><th>WordPress 外掛</th><th>瀏覽器擴充功能</th></tr>
      </thead>
      <tbody>
          <tr><td>掛在哪裡</td><td>您自己的 WP 站台</td><td>使用者瀏覽器，所有網頁</td></tr>
          <tr><td>誰來設定</td><td>站長（一次設定全站生效）</td><td>每位使用者在自己的瀏覽器設定</td></tr>
          <tr><td>V1 模型來源</td><td>外掛內建 + 遠端創意工坊</td><td>擴充功能內建（IndexedDB 快取）</td></tr>
          <tr><td>V2 自訂 URL</td><td>付費 + 「快取至本機」可選</td><td>付費，無本機快取（直連）</td></tr>
          <tr><td>帳號</td><td colspan="2">同一個 live2dweb.com 帳號，但授權令牌互不共享，需要分別登入</td></tr>
      </tbody>
  </table>
  
  <h2>7. 隱私</h2>
  <p>擴充功能<strong>不讀取</strong>您造訪的網頁 URL、內容、Cookie、表單或瀏覽歷史，<strong>不收集</strong>地理位置 / IP / 裝置指紋 / 健康資訊 / 通訊內容。完整的資料使用清單見 <a href="{{ '/zh-TW/privacy/extension.html' | relative_url }}">瀏覽器擴充功能隱私權政策</a>。</p>
