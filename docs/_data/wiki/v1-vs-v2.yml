  <p>前端的判斷邏輯是：<em>模型規格版本 ≥ 3 走 V2 路徑</em>，否則走 V1。</p>
  
  <h2>WordPress 後台的「創意工坊 API 類型」</h2>
  <p>後台 → 設定 →「創意工坊 API 類型」是一個三選下拉，對應三種使用方式：</p>
  <table>
      <thead>
          <tr><th style="width:18%">取值</th><th>意義</th><th style="width:14%">付費？</th><th>對應模型</th></tr>
      </thead>
      <tbody>
          <tr><td><strong>本機</strong> (<code>local</code>)</td><td>使用外掛 <code>assets/v1/</code> 內建的 V1 模型，REST 路徑 <code>/wp-json/live2d/v1/model/*</code>，全在自己站台運作，不依賴任何第三方介面。</td><td>免費</td><td>V1（22/33/Pio/Tia/Shizuku/HyperdimensionNeptunia/KantaiCollection 等）</td></tr>
          <tr><td><strong>遠端創意工坊</strong> (<code>remote</code>)</td><td>從 <code>www.live2dweb.com</code> 取得模型清單，下載到本機後再走 V1 載入鏈。下載結果放在 <code>wp-content/plugins/live-2d/model/</code>。</td><td>免費</td><td>V1（與「本機」同源，只是來源不同）</td></tr>
          <tr><td><strong>自訂</strong> (<code>custom</code>)</td><td>填一個您自己的 <code>modelAPI</code> URL，載入 V2（Cubism 4+）模型。可以指定一個直連 <code>*.model3.json</code>，也可以指定一個目錄根 + 多個 <code>modelDir</code> 子目錄。</td><td><strong>需付費</strong></td><td>V2（Cubism 4+ / 5）</td></tr>
      </tbody>
  </table>
  
  <h3>為什麼 V2 要付費？</h3>
  <p>因為 Live2D 株式會社（Live2D Inc.）要求第三方擴充型應用使用 Cubism 4+ 核心時必須簽約。本外掛已與 Live2D 株式會社簽訂長期合約，並依其要求散布正版 Cubism Core，所以 V2 路徑會向站長收取一次性授權費，相當於把上游授權成本分攤給真正使用 V2 的站台。V1 模型不依賴 Cubism Core，因此永遠免費。</p>
  
  <h2>我該選哪一個？</h2>
  <ul>
      <li><strong>只想要會動的二次元小人陪我看部落格 →</strong> 安裝外掛、保持預設即可，跑的就是內建的 V1 模型（本機）。</li>
      <li><strong>想用市面上現成的小人皮膚（22 娘、Pio 那一系列）→</strong> 也是 V1，可以直接使用「本機」或「遠端創意工坊」。</li>
      <li><strong>有自己製作 / 購買的 MOC3 模型 →</strong> 走 V2 自訂 URL，先付費，再依照 <a href="{{ '/zh-TW/wiki/custom-model.html' | relative_url }}">V2 自訂模型教學</a>設定。</li>
      <li><strong>想最大化保護 V2 模型不被盜連 →</strong> 在自訂 URL 之外另外開啟「<a href="{{ '/zh-TW/wiki/anti-hotlink.html' | relative_url }}">快取至本機</a>」，請參考防盜連頁面。</li>
  </ul>
  
  <h2>常見誤解</h2>
  <ul>
      <li><strong>「V1 是不是不能用了？」</strong> —— 沒有。V1 路徑自 2.1.3 起反而完全本機化（不再依賴 fghrsh.net 等第三方來源），穩定度比過去好得多。它只是不會再加入 <em>新功能</em>（例如混合變形、超採樣這些 Cubism 4+ 才有的特性）。</li>
      <li><strong>「V2 = Cubism 2 嗎？」</strong> —— 不是。本外掛的 V2 指的是 <em>第二代載入器</em>，對應 Cubism Web SDK 4 / 5。Cubism 2 是遠古版本，反而歸在 V1 路徑下。</li>
      <li><strong>「我看舊文件寫 v3 模型……」</strong> —— 舊文件中的 "v3" 就是現在的 V2。所有「v3 / V3」字樣請一律以 V2 解讀。</li>
  </ul>
